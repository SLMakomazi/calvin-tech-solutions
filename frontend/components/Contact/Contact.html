<!-- Contact Component -->
<section id="contact" class="contact-component">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Get In Touch</h2>
            <p class="section-subtitle">Let's discuss how we can transform your business with technology</p>
        </div>
        <div class="contact-container">
            <div class="contact-info">
                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="info-content">
                        <h4>Visit Our Office</h4>
                        <p>291 Sijentu Cl, Kayamandi, Stellenbosch, 7600</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="info-content">
                        <h4>Call Us</h4>
                        <p>084 606 9066</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="info-content">
                        <h4>Email Us</h4>
                        <p>info@calvintech.com</p>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="info-content">
                        <h4>Contact Person</h4>
                        <p>Siseko Makomazi - Founder & CEO</p>
                    </div>
                </div>
            </div>
            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder=" " required>
                    <label for="name">Your Name</label>
                </div>
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder=" " required>
                    <label for="email">Your Email</label>
                </div>
                <div class="form-group">
                    <input type="text" id="subject" name="subject" placeholder=" " required>
                    <label for="subject">Subject</label>
                </div>
                <div class="form-group">
                    <textarea id="message" name="message" rows="5" placeholder=" " required></textarea>
                    <label for="message">Your Message</label>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span class="btn-text">Send Message</span>
                    <div class="btn-glow"></div>
                </button>
            </form>
        </div>
    </div>
</section>
